<meta charset="UTF-8">

<title>AI-JIN — Lesson 1: AI Kya Hai?</title>
<style>
  @import url(&apos;https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@300;400;500;600&display=swap&apos;);
  :root {
    --green: #00C853; --green-dark: #009624; --green-light: #E8F5E9;
    --navy: #0D1B2A; --navy-soft: #1A2D42; --gold: #FFD600; --gold-light: #FFF9C4;
    --white: #FFFFFF; --gray: #F5F7FA; --text: #1A1A2E; --text-soft: #4A5568;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.10); --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: &apos;Hind&apos;, sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--navy); padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .nav-mentor-img {
    width: 42px; height: 42px; border-radius: 50%;
    object-fit: cover; object-position: top;
    border: 2px solid var(--gold);
    flex-shrink: 0;
  }
  .nav-text { display: flex; flex-direction: column; }
  .nav-logo { font-family: &apos;Baloo 2&apos;, cursive; font-size: 1.2rem; font-weight: 800; color: var(--gold); line-height: 1.1; }
  .nav-sub { font-size: 0.72rem; color: #A0AEC0; font-weight: 500; }
  .nav-badge { background: var(--green); color: white; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 30px; margin-left: auto; }

  .progress-bar-wrap { background: #e2e8f0; height: 5px; }
  .progress-bar { height: 5px; background: linear-gradient(90deg, var(--green), var(--gold)); width: 0%; transition: width 0.5s ease; }

  .steps { display: flex; justify-content: center; gap: 8px; padding: 16px 20px 0; flex-wrap: wrap; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #CBD5E0; transition: all 0.3s; cursor: pointer; }
  .step-dot.done { background: var(--green); }
  .step-dot.active { background: var(--gold); width: 26px; border-radius: 6px; }

  .section { display: none; animation: fadeSlide 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #1a2d42 100%);
    padding: 48px 24px 44px; text-align: center; position: relative; overflow: hidden;
  }
  .hero::before { content:&apos;🤖&apos;; font-size:150px; position:absolute; top:-20px; right:-20px; opacity:0.05; pointer-events:none; }
  .mentor-circle {
    width: 110px; height: 110px; border-radius: 50%;
    object-fit: cover; object-position: top center;
    border: 4px solid var(--gold);
    box-shadow: 0 0 0 6px rgba(255,214,0,0.2), 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 16px;
  }
  .mentor-name { font-family:&apos;Baloo 2&apos;,cursive; font-size:1rem; font-weight:700; color:var(--gold); margin-bottom:4px; letter-spacing:0.5px; }
  .mentor-title { font-size:0.78rem; color:#A0AEC0; margin-bottom:20px; }
  .hero .eyebrow { color:var(--green); font-size:0.82rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
  .hero h1 { font-family:&apos;Baloo 2&apos;,cursive; font-size:2.2rem; font-weight:800; color:var(--white); line-height:1.2; margin-bottom:10px; }
  .hero h1 span { color:var(--gold); }
  .hero p { color:#A0AEC0; font-size:0.97rem; max-width:460px; margin:0 auto 28px; line-height:1.7; }
  .start-btn {
    background:var(--green); color:white; border:none; padding:14px 36px;
    border-radius:50px; font-size:1.05rem; font-weight:700; cursor:pointer;
    font-family:&apos;Baloo 2&apos;,cursive; transition:all 0.2s;
    box-shadow:0 4px 18px rgba(0,200,83,0.35);
  }
  .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,200,83,0.4); }

  /* LESSON */
  .lesson-wrap { max-width:680px; margin:0 auto; padding:28px 18px 60px; }
  .lesson-card { background:white; border-radius:var(--radius); padding:26px 24px; margin-bottom:18px; box-shadow:var(--card-shadow); border-left:5px solid var(--green); }
  .lesson-card.gold-border { border-left-color:var(--gold); }
  .lesson-card.navy-border { border-left-color:var(--navy); }
  .card-title { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.2rem; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .lesson-card p { color:var(--text-soft); line-height:1.8; font-size:0.95rem; margin-bottom:10px; }
  .lesson-card p:last-child { margin-bottom:0; }
  .highlight-box { background:var(--green-light); border-radius:12px; padding:14px 16px; margin:12px 0; border-left:4px solid var(--green); }
  .highlight-box p { color:#2d6a4f; font-weight:600; margin:0; }
  .gold-box { background:var(--gold-light); border-radius:12px; padding:14px 16px; margin:12px 0; border-left:4px solid var(--gold); }
  .gold-box p { color:#7B6000; font-weight:500; margin:0; }

  .styled-table { width:100%; border-collapse:collapse; margin:12px 0; border-radius:12px; overflow:hidden; }
  .styled-table th { background:var(--navy); color:white; padding:10px 13px; text-align:left; font-size:0.86rem; font-weight:600; }
  .styled-table td { padding:10px 13px; font-size:0.88rem; color:var(--text-soft); border-bottom:1px solid #f0f4f8; }
  .styled-table tr:last-child td { border-bottom:none; }
  .styled-table tr:nth-child(even) td { background:var(--gray); }

  .type-grid { display:grid; gap:12px; margin:12px 0; }
  .type-card { border-radius:14px; padding:15px 16px; display:flex; align-items:flex-start; gap:13px; }
  .type-card.t1{background:#E3F2FD;} .type-card.t2{background:#F3E5F5;} .type-card.t3{background:#FFF3E0;}
  .type-card .num { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.8rem; font-weight:800; line-height:1; }
  .type-card.t1 .num{color:#1565C0;} .type-card.t2 .num{color:#6A1B9A;} .type-card.t3 .num{color:#E65100;}
  .type-card h4 { font-family:&apos;Baloo 2&apos;,cursive; font-size:0.98rem; font-weight:700; margin-bottom:4px; }
  .type-card p { font-size:0.86rem; color:var(--text-soft); line-height:1.6; margin:0; }

  /* JIN TIP BOX */
  .jin-tip {
    background: linear-gradient(135deg, var(--navy), var(--navy-soft));
    border-radius: 16px; padding: 18px 18px 18px 16px;
    display: flex; gap: 14px; align-items: flex-start; margin: 16px 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .jin-tip-img { width:52px; height:52px; border-radius:50%; object-fit:cover; object-position:top; border:2px solid var(--gold); flex-shrink:0; }
  .jin-tip-text { flex:1; }
  .jin-tip-label { font-size:0.72rem; font-weight:700; color:var(--gold); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
  .jin-tip-text p { color:#E2E8F0; font-size:0.9rem; line-height:1.7; margin:0; }

  .nav-btns { display:flex; gap:12px; justify-content:center; margin-top:26px; flex-wrap:wrap; }
  .btn-next { background:var(--green); color:white; border:none; padding:13px 30px; border-radius:50px; font-size:1rem; font-weight:700; cursor:pointer; font-family:&apos;Baloo 2&apos;,cursive; transition:all 0.2s; box-shadow:0 4px 14px rgba(0,200,83,0.3); }
  .btn-next:hover { transform:translateY(-2px); }
  .btn-back { background:white; color:var(--navy); border:2px solid #e2e8f0; padding:11px 26px; border-radius:50px; font-size:0.93rem; font-weight:600; cursor:pointer; font-family:&apos;Baloo 2&apos;,cursive; transition:all 0.2s; }
  .btn-back:hover { border-color:var(--navy); }

  /* QUIZ */
  .quiz-wrap { max-width:680px; margin:0 auto; padding:28px 18px 60px; }
  .quiz-header { text-align:center; margin-bottom:24px; }
  .quiz-header h2 { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.7rem; font-weight:800; color:var(--navy); }
  .quiz-header p { color:var(--text-soft); margin-top:6px; font-size:0.92rem; }
  .q-card { background:white; border-radius:var(--radius); padding:24px; margin-bottom:18px; box-shadow:var(--card-shadow); }
  .q-num { font-size:0.75rem; font-weight:700; color:var(--green); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  .q-text { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.05rem; font-weight:700; color:var(--navy); margin-bottom:14px; line-height:1.5; }
  .options { display:grid; gap:9px; }
  .option-btn { background:var(--gray); border:2px solid transparent; border-radius:12px; padding:12px 15px; text-align:left; cursor:pointer; font-size:0.91rem; font-weight:500; color:var(--text); transition:all 0.18s; font-family:&apos;Hind&apos;,sans-serif; }
  .option-btn:hover { border-color:var(--green); background:var(--green-light); }
  .option-btn.correct { background:var(--green-light); border-color:var(--green); color:#1B5E20; font-weight:600; }
  .option-btn.wrong { background:#FFEBEE; border-color:#EF5350; color:#B71C1C; }
  .option-btn:disabled { cursor:default; }
  .q-feedback { display:none; margin-top:12px; padding:12px 15px; border-radius:12px; font-size:0.9rem; font-weight:500; line-height:1.6; }
  .q-feedback.show { display:block; }
  .q-feedback.correct-fb { background:var(--green-light); color:#1B5E20; }
  .q-feedback.wrong-fb { background:#FFEBEE; color:#B71C1C; }

  .score-box { background:var(--navy); color:white; border-radius:var(--radius); padding:30px 24px; text-align:center; margin-bottom:18px; box-shadow:var(--card-shadow); }
  .score-box .score-num { font-family:&apos;Baloo 2&apos;,cursive; font-size:3.8rem; font-weight:800; color:var(--gold); line-height:1; }
  .score-box .score-label { font-size:0.9rem; color:#A0AEC0; margin-top:5px; }
  .score-box .score-msg { font-size:1rem; font-weight:600; margin-top:12px; color:var(--green); }
  .score-mentor { display:flex; align-items:center; gap:12px; justify-content:center; margin-top:16px; }
  .score-mentor img { width:44px; height:44px; border-radius:50%; object-fit:cover; object-position:top; border:2px solid var(--gold); }
  .score-mentor p { font-size:0.88rem; color:#CBD5E0; text-align:left; line-height:1.5; }

  /* HOMEWORK */
  .hw-wrap { max-width:680px; margin:0 auto; padding:28px 18px 60px; }
  .hw-header { text-align:center; margin-bottom:24px; }
  .hw-header h2 { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.7rem; font-weight:800; color:var(--navy); }
  .hw-task { background:white; border-radius:var(--radius); padding:20px 22px; margin-bottom:14px; box-shadow:var(--card-shadow); display:flex; gap:14px; align-items:flex-start; }
  .hw-task .task-icon { font-size:1.9rem; flex-shrink:0; margin-top:2px; }
  .hw-task h4 { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.02rem; font-weight:700; color:var(--navy); margin-bottom:5px; }
  .hw-task p { font-size:0.88rem; color:var(--text-soft); line-height:1.7; margin:0; }
  .hw-task a { color:var(--green); font-weight:600; text-decoration:none; }
  .hw-check { display:flex; align-items:center; gap:9px; margin-top:10px; cursor:pointer; }
  .hw-check input[type=checkbox] { width:19px; height:19px; accent-color:var(--green); cursor:pointer; }
  .hw-check label { font-size:0.88rem; font-weight:500; color:var(--text-soft); cursor:pointer; }

  /* FEEDBACK */
  .feedback-wrap { max-width:680px; margin:0 auto; padding:28px 18px 60px; }
  .feedback-wrap h2 { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.7rem; font-weight:800; color:var(--navy); text-align:center; margin-bottom:6px; }
  .feedback-wrap .sub { text-align:center; color:var(--text-soft); margin-bottom:24px; font-size:0.93rem; }
  .emoji-grid { display:flex; gap:10px; justify-content:center; margin:16px 0 22px; flex-wrap:wrap; }
  .emoji-btn { background:white; border:3px solid transparent; border-radius:14px; padding:12px 14px; cursor:pointer; font-size:1.8rem; transition:all 0.2s; box-shadow:var(--card-shadow); display:flex; flex-direction:column; align-items:center; gap:5px; min-width:72px; }
  .emoji-btn span { font-size:0.68rem; font-weight:600; color:var(--text-soft); }
  .emoji-btn:hover,.emoji-btn.selected { border-color:var(--green); background:var(--green-light); }
  .fb-form { background:white; border-radius:var(--radius); padding:24px; box-shadow:var(--card-shadow); }
  .fb-form label { display:block; font-weight:600; color:var(--navy); margin-bottom:7px; font-size:0.93rem; }
  .fb-form textarea,.fb-form input[type=text] { width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:11px 13px; font-size:0.91rem; font-family:&apos;Hind&apos;,sans-serif; color:var(--text); margin-bottom:16px; resize:vertical; transition:border 0.2s; }
  .fb-form textarea:focus,.fb-form input:focus { border-color:var(--green); outline:none; }
  .fb-form textarea { min-height:90px; }
  .submit-btn { width:100%; background:linear-gradient(135deg,var(--green),var(--green-dark)); color:white; border:none; padding:14px; border-radius:50px; font-size:1.02rem; font-weight:700; cursor:pointer; font-family:&apos;Baloo 2&apos;,cursive; transition:all 0.2s; box-shadow:0 4px 18px rgba(0,200,83,0.35); }
  .submit-btn:hover { transform:translateY(-2px); }

  /* THANK YOU */
  .thankyou-card { background:white; border-radius:var(--radius); padding:38px 26px; text-align:center; box-shadow:var(--card-shadow); }
  .thankyou-card .ty-mentor { width:90px; height:90px; border-radius:50%; object-fit:cover; object-position:top; border:4px solid var(--gold); box-shadow:0 0 0 5px rgba(255,214,0,0.15); margin-bottom:14px; }
  .thankyou-card h3 { font-family:&apos;Baloo 2&apos;,cursive; font-size:1.6rem; font-weight:800; color:var(--navy); margin-bottom:10px; }
  .thankyou-card p { color:var(--text-soft); line-height:1.8; margin-bottom:6px; font-size:0.93rem; }
  .thankyou-card .highlight { color:var(--green); font-weight:700; }

  @media(max-width:500px){
    .hero h1{font-size:1.7rem;} .score-box .score-num{font-size:3rem;}
    .type-card{flex-direction:column;gap:8px;}
  }
</style>

<script>
  const totalSections = 6;
  let currentSection = 0;
  let quizScore = 0;
  let quizAnswered = 0;
  let selectedEmoji = &apos;&apos;;

  const dotsEl = document.getElementById(&apos;stepDots&apos;);
  const labels = [&apos;Intro&apos;,&apos;Lesson&apos;,&apos;Quiz&apos;,&apos;Homework&apos;,&apos;Feedback&apos;,&apos;Done&apos;];
  labels.forEach((l,i) => {
    const d = document.createElement(&apos;div&apos;);
    d.className = &apos;step-dot&apos;+(i===0?&apos; active&apos;:&apos;&apos;);
    d.title = l;
    d.onclick = () => { if(i <= currentSection) goTo(i); };
    dotsEl.appendChild(d);
  });

  function updateUI() {
    document.getElementById(&apos;progressBar&apos;).style.width = ((currentSection/(totalSections-1))*100)+&apos;%&apos;;
    document.querySelectorAll(&apos;.step-dot&apos;).forEach((d,i) => {
      d.className = &apos;step-dot&apos;+(i<currentSection?&apos; done&apos;:&apos;&apos;)+(i===currentSection?&apos; active&apos;:&apos;&apos;);
    });
    window.scrollTo({top:0,behavior:&apos;smooth&apos;});
  }

  function goTo(n) {
    document.getElementById(&apos;sec&apos;+currentSection).classList.remove(&apos;active&apos;);
    currentSection = n;
    document.getElementById(&apos;sec&apos;+currentSection).classList.add(&apos;active&apos;);
    updateUI();
  }

  function answer(btn, qid, correct) {
    const card = document.getElementById(qid);
    card.querySelectorAll(&apos;.option-btn&apos;).forEach(b => b.disabled = true);
    btn.classList.add(correct ? &apos;correct&apos; : &apos;wrong&apos;);
    document.getElementById(qid+&apos;-fb&apos;+(correct?&apos;&apos;:&apos;-w&apos;)).classList.add(&apos;show&apos;);
    if(correct) quizScore++;
    quizAnswered++;
    if(quizAnswered === 5) setTimeout(showScore, 600);
  }

  function showScore() {
    const msgs = [
      [0,2,"Koi baat nahi! Dobara lesson parho — zaroor samajh aayega!"],
      [3,3,"Acha hai! Thodi aur practice karo!"],
      [4,4,"Bahut badhiya! Ek kadam aur! 🌟"],
      [5,5,"Perfect! Bilkul sher ho tum! 🏆"]
    ];
    const mentorMsgs = [
      [0,2,"Haan yaar, koi baat nahi — main hun na! Dobara parho. 💪"],
      [3,3,"Theek ja rahe ho — keep going! 👍"],
      [4,4,"Almost perfect — mujhe tumpe fakhr hai! 🌟"],
      [5,5,"Zabardast! Full marks! Lesson 2 ke liye tayyar ho! 🚀"]
    ];
    let msg = msgs[0][2], mMsg = mentorMsgs[0][2];
    for(const [lo,hi,m] of msgs) if(quizScore>=lo&&quizScore<=hi){msg=m;}
    for(const [lo,hi,m] of mentorMsgs) if(quizScore>=lo&&quizScore<=hi){mMsg=m;}

<script>

  let isLiked      = localStorage.getItem(LIKE_KEY) === &apos;true&apos;;
  let isCommented  = localStorage.getItem(CMT_KEY)  === &apos;true&apos;;
  let isUnlocked   = localStorage.getItem(LESSON_KEY) === &apos;true&apos;;
 
  // If fully unlocked before, skip gate
  if (isUnlocked) {
    document.getElementById(&apos;sec0&apos;).classList.remove(&apos;active&apos;);

    initGate();

  // ===== GATE INIT =====
  function initGate() {
    if (isLiked) {
      markStep1Done();
    }

  function onLikeClick() {
    // After clicking, show verify button after 3 sec (time to actually like)
    setTimeout(() => {
      document.getElementById(&apos;likeVerifyBtn&apos;).style.display = &apos;block&apos;;
    }, 3000);
  }
 
  function showLikeModal() {
    document.getElementById(&apos;likeModal&apos;).classList.add(&apos;show&apos;);
  }
  function closeLikeModal() {
    document.getElementById(&apos;likeModal&apos;).classList.remove(&apos;show&apos;);
  }
 
  function confirmLike() {
    closeLikeModal();
    localStorage.setItem(LIKE_KEY, &apos;true&apos;);
    isLiked = true;
    markStep1Done();
  }
 
  function markStep1Done() {
    const row = document.getElementById(&apos;step1Row&apos;);
    row.classList.add(&apos;completed&apos;);
    document.getElementById(&apos;step1Num&apos;).textContent = &apos;✓&apos;;
    document.getElementById(&apos;likeVerifyBtn&apos;).style.display = &apos;none&apos;;
 
    // Show step 2

    step2Row.style.opacity = &apos;1&apos;;

      document.getElementById(&apos;commentVerifyBtn2&apos;).style.display = &apos;block&apos;;

  function confirmComment() {

  // Already liked toggle
  function toggleAlreadyLiked() {

  // ===== LESSON INIT =====
  function initLesson() {
    const totalSections = 7; // sec1 to sec6 + sec0
    const dotsEl = document.getElementById(&apos;stepDots&apos;);
    dotsEl.innerHTML = &apos;&apos;;
    const labels = [&apos;Intro&apos;,&apos;Lesson&apos;,&apos;Quiz&apos;,&apos;Homework&apos;,&apos;Feedback&apos;,&apos;Done&apos;];
    labels.forEach((l,i) => {
      const d = document.createElement(&apos;div&apos;);
      d.className = &apos;step-dot&apos;+(i===0?&apos; active&apos;:&apos;&apos;);
      d.title = l;
      d.onclick = () => { if(i+1 <= currentSection) goTo(i+1); };
      dotsEl.appendChild(d);
    });
    currentSection = 1;
    document.getElementById(&apos;sec1&apos;).classList.add(&apos;active&apos;);
    updateUI();
  }
 
  // ===== NAVIGATION =====
  let currentSection = 0;
  let quizScore = 0;
  let quizAnswered = 0;
  let selectedEmoji = &apos;&apos;;
 
  function updateUI() {
    const totalSteps = 6;
    const step = currentSection - 1; // 0-indexed for dots
    document.getElementById(&apos;progressBar&apos;).style.width = (((currentSection-1)/(totalSteps-1))*100)+&apos;%&apos;;
    document.querySelectorAll(&apos;.step-dot&apos;).forEach((d,i) => {
      d.className = &apos;step-dot&apos;+(i<step?&apos; done&apos;:&apos;&apos;)+(i===step?&apos; active&apos;:&apos;&apos;);
    });
    window.scrollTo({top:0,behavior:&apos;smooth&apos;});
  }
 
  function goTo(n) {
    if (currentSection > 0) {
      document.getElementById(&apos;sec&apos;+currentSection).classList.remove(&apos;active&apos;);
    }
    currentSection = n;
    document.getElementById(&apos;sec&apos;+n).classList.add(&apos;active&apos;);
    if (n > 0) updateUI();

  // ===== QUIZ =====
  function answer(btn, qid, correct) {
    const card = document.getElementById(qid);
    card.querySelectorAll(&apos;.option-btn&apos;).forEach(b => b.disabled = true);
    btn.classList.add(correct ? &apos;correct&apos; : &apos;wrong&apos;);
    const suffix = correct ? &apos;-fb&apos; : &apos;-fb-w&apos;;
    document.getElementById(qid+suffix).classList.add(&apos;show&apos;);
    if(correct) quizScore++;
    quizAnswered++;
    if(quizAnswered === 5) setTimeout(showScore, 700);

  function showScore() {

    ];
    const mentorMsgs = [
      [0,2,"Haan yaar, koi baat nahi — main hun na! Dobara parho. 💪"],
      [3,3,"Theek ja rahe ho — keep going! 👍"],
      [4,4,"Almost perfect — mujhe tumpe fakhr hai! 🌟"],
      [5,5,"Zabardast! 5/5! Lesson 3 ke liye bilkul tayyar ho! 🚀"]
    ];
    let msg = msgs[0][2], mMsg = mentorMsgs[0][2];
    for(const [lo,hi,m] of msgs) if(quizScore>=lo&&quizScore<=hi){msg=m;}

  const hwState = { hw1:false, hw2:false, hw3:false, hw4:false };

  function selectEmoji(btn) {
    document.querySelectorAll(&apos;.emoji-btn&apos;).forEach(b => b.classList.remove(&apos;selected&apos;));
    btn.classList.add(&apos;selected&apos;);

    if(typeof gtag !== &apos;undefined&apos;) {

        &apos;event_label&apos;: selectedEmoji,
        &apos;value&apos;: 1
      });

  }
